<!doctype html>

<script
	type=module
>
	function
	print(
		...
		strings
	){
		function
		print(
			string
		){
			document
			.body
			.insertAdjacentHTML(
				'beforeend',
				
				string
				+
				'<br>'
			)
		}
		
		for(
			let
			string
			of
			strings
		)
		print(
			string
		)
		
		print(
			''
		)
	}
	
	function
	create_element(
		tag,
		attributes
	){
		let
		element
		=
		document
		.createElement(
			tag
		)
		
		for(
			let
			attribute
			in
			attributes
		){
			element[
				attribute
			]
			=
			attributes[
				attribute
			]
		}
		
		return(
			element
		)
	}
	
	let
	n=
	1
	
	document
	.body
	.append(
		create_element(
			'button',
			
			{
				textContent:
				'button',
				
				onclick(){
					print(
						n
					)
					
					++
					n
				}
			}
		)
	)
</script>
